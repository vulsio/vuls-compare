name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-db:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: db
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: db/go.mod
      - run: go build -v ./...

  build-detection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detection
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: detection/go.mod
      - run: go build -v ./...
